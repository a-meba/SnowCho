<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap");

        * { box-sizing: border-box; }

        html {
            background: url('https://image.genie.co.kr/Y/IMAGE/IMG_ALBUM/081/153/107/81153107_1548380615317_1_600x600.JPG/dims/resize/Q_80,0') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Nunito", sans-serif;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            margin: 0;
        }

        .phone {
            width: 380px;
            background-color: white;
            height: 700px;
            border-radius: 30px;
            box-shadow: 0 19px 38px rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .innerbox1 h1 { font-size: 32px; font-weight: 700; margin-bottom: 15px; }
        .innerbox1 p { opacity: 0.6; line-height: 1.5; margin-bottom: 30px; }

        .login-info {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            text-align: left;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        input {
            width: 100%;
            height: 50px;
            padding: 0 15px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
        }

        .button1 {
            width: 100%;
            height: 55px;
            background-color: #222222;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .button1:hover { background-color: #444; }

        #msg-box {
            margin-top: 15px;
            font-size: 13px;
            font-weight: 600;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="phone">
        <div class="innerbox1">
            <h1>Sign In</h1>
            <p>Admin 계정으로 로그인 시<br>hi.html 페이지로 이동합니다.</p>
            
            <div class="login-info">
                <strong>Admin 계정:</strong> testadmin@test.com / 1234<br>
                <strong>일반 계정:</strong> testuser@test.com / 1234
            </div>
        </div>

        <div class="innerbox2">
            <input type="text" id="userid" placeholder="Email address" value="testadmin@test.com">
            <input type="password" id="userpwd" placeholder="Password" value="1234">
            <button type="button" class="button1" onclick="handleLogin()">Sign In</button>
            <div id="msg-box"></div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const id = document.getElementById('userid').value;
            const pw = document.getElementById('userpwd').value;
            const msgBox = document.getElementById('msg-box');

            if (id === "testadmin@test.com" && pw === "1234") {
                msgBox.style.color = "blue";
                msgBox.innerText = "관리자 로그인 성공! 이동 중...";
                // 관리자 로그인 성공 시 hi.html로 이동
                setTimeout(() => {
                    window.location.href = "hi.html";
                }, 1000);
            } else if (id === "testuser@test.com" && pw === "1234") {
                msgBox.style.color = "green";
                msgBox.innerText = "일반 사용자 로그인 성공!";
            } else {
                msgBox.style.color = "red";
                msgBox.innerText = "아이디 또는 비밀번호가 틀렸습니다.";
            }
        }
    </script>
</body>
</html>
